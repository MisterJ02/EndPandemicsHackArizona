plugins {
    id 'com.android.application'
}

android {
    namespace 'com.endpandemics.riskmonitor'
    compileSdk 34

    defaultConfig {
        applicationId "com.endpandemics.riskmonitor"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    buildTypes {
        debug {
            debuggable true
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
