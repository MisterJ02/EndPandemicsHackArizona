services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: outbreak
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    command: sh -c "python manage.py migrate && python manage.py seed_reports && python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/outbreak
      DEBUG: "True"
      SECRET_KEY: dev-insecure
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata:
